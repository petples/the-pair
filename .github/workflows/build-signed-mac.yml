name: Publish Signed macOS + Homebrew

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version-bump:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version change
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs')
          const { execSync } = require('child_process')

          const currentVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version
          let previousVersion = ''

          try {
            previousVersion = JSON.parse(
              execSync('git show HEAD^:package.json', { encoding: 'utf8' })
            ).version
          } catch {
            previousVersion = ''
          }

          const shouldPublish = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch'
            ? 'true'
            : String(currentVersion !== previousVersion)

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${currentVersion}\n`)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=v${currentVersion}\n`)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_publish=${shouldPublish}\n`)
          NODE

  publish-release:
    needs: detect-version-bump
    if: needs.detect-version-bump.outputs.should_publish == 'true'
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.detect-version-bump.outputs.version }}
      TAG: ${{ needs.detect-version-bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import Code Signing Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Verify signing identity
        id: signing_identity
        env:
          EXPECTED_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          security find-identity -v -p codesigning | tee identities.txt
          RESOLVED_IDENTITY=$(awk -F '"' '/Developer ID Application/ {print $2; exit}' identities.txt)
          RESOLVED_HASH=$(awk '/Developer ID Application/ {print $2; exit}' identities.txt)
          if [ -z "$RESOLVED_IDENTITY" ]; then
            echo "No Developer ID Application identity was imported."
            exit 1
          fi
          if [ -z "$RESOLVED_HASH" ]; then
            echo "No Developer ID Application identity hash was detected."
            exit 1
          fi
          if ! grep -F -- "$EXPECTED_IDENTITY" identities.txt >/dev/null; then
            echo "Expected signing identity was not imported into the runner keychain."
            exit 1
          fi
          echo "resolved_identity=$RESOLVED_IDENTITY" >> "$GITHUB_OUTPUT"
          echo "resolved_hash=$RESOLVED_HASH" >> "$GITHUB_OUTPUT"

      - name: Build signed and notarized app
        env:
          CSC_NAME: ${{ steps.signing_identity.outputs.resolved_hash }}
          CSC_KEYCHAIN: signing_temp.keychain-db
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build:mac

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "dist/the-pair-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "dist/the-pair-${VERSION}.dmg"

      - name: Verify signature
        run: |
          APP_PATH=$(find dist -maxdepth 3 -name "*.app" | head -n 1)
          codesign --verify --verbose "$APP_PATH"
          spctl --assess --type exec --verbose "$APP_PATH"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.dmg dist/*.zip --clobber
          else
            gh release create "$TAG" dist/*.dmg dist/*.zip --title "$TAG" --generate-notes
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: timwuhaotian/homebrew-the-pair
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        run: |
          SHA256=$(shasum -a 256 "dist/the-pair-${VERSION}.dmg" | awk '{print $1}')
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/the-pair.rb <<EOF
          cask "the-pair" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${{ github.repository }}/releases/download/v#{version}/the-pair-#{version}.dmg",
                verified: "github.com/${{ github.repository }}/"
            name "The Pair"
            desc "Desktop orchestrator for dual AI agents (Mentor + Executor) for autonomous coding tasks"
            homepage "https://github.com/${{ github.repository }}"

            auto_updates true
            depends_on macos: ">= :monterey"

            app "The Pair.app"

            uninstall quit: "com.electron.the-pair"

            zap trash: [
              "~/.config/the-pair",
              "~/Library/Application Support/the-pair",
              "~/Library/Caches/com.electron.the-pair",
              "~/Library/Logs/the-pair",
              "~/Library/Preferences/com.electron.the-pair.plist",
              "~/Library/Saved Application State/com.electron.the-pair.savedState",
            ]
          end
          EOF

      - name: Commit and push Homebrew cask
        run: |
          cd homebrew-tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/the-pair.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date"
            exit 0
          fi
          git commit -m "Update the-pair to v${VERSION}"
          git push
