name: Publish Signed macOS + Homebrew

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version-bump:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version change
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs')
          const { execSync } = require('child_process')

          const currentVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version
          let previousVersion = ''

          try {
            previousVersion = JSON.parse(
              execSync('git show HEAD^:package.json', { encoding: 'utf8' })
            ).version
          } catch {
            previousVersion = ''
          }

          const shouldPublish = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch'
            ? 'true'
            : String(currentVersion !== previousVersion)

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${currentVersion}\n`)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=v${currentVersion}\n`)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_publish=${shouldPublish}\n`)
          NODE

  publish-release:
    needs: detect-version-bump
    if: needs.detect-version-bump.outputs.should_publish == 'true'
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.detect-version-bump.outputs.version }}
      TAG: ${{ needs.detect-version-bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      # Tauri handles importing the cert, signing, and notarizing completely natively
      - name: Build, sign, and notarize Tauri app
        env:
          APPLE_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Package artifacts for release
        run: |
          mkdir -p dist
          
          # Move DMG to expected location for the Homebrew script
          mv "src-tauri/target/universal-apple-darwin/release/bundle/dmg/The Pair_${VERSION}_universal.dmg" "dist/the-pair-${VERSION}.dmg"
          
          # Create ZIP of the raw .app
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/The Pair.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/the-pair-${VERSION}.zip"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.dmg dist/*.zip --clobber
          else
            gh release create "$TAG" dist/*.dmg dist/*.zip --title "$TAG" --generate-notes
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: timwuhaotian/homebrew-the-pair
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        run: |
          SHA256=$(shasum -a 256 "dist/the-pair-${VERSION}.dmg" | awk '{print $1}')
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/the-pair.rb <<EOF
          cask "the-pair" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${{ github.repository }}/releases/download/v#{version}/the-pair-#{version}.dmg",
                verified: "github.com/${{ github.repository }}/"
            name "The Pair"
            desc "Desktop orchestrator for dual AI agents (Mentor + Executor) for autonomous coding tasks"
            homepage "https://github.com/${{ github.repository }}"

            auto_updates true
            depends_on macos: ">= :monterey"

            app "The Pair.app"

            uninstall quit: "com.thepair.app"

            zap trash: [
              "~/.config/the-pair",
              "~/Library/Application Support/the-pair",
              "~/Library/Caches/com.thepair.app",
              "~/Library/Logs/the-pair",
              "~/Library/Preferences/com.thepair.app.plist",
              "~/Library/Saved Application State/com.thepair.app.savedState",
            ]
          end
          EOF

      - name: Commit and push Homebrew cask
        run: |
          cd homebrew-tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/the-pair.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date"
            exit 0
          fi
          git commit -m "Update the-pair to v${VERSION}"
          git push