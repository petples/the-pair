name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version-bump:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version change
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs')
          const { execSync } = require('child_process')

          const currentVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version
          let previousVersion = ''

          try {
            previousVersion = JSON.parse(
              execSync('git show HEAD^:package.json', { encoding: 'utf8' })
            ).version
          } catch {
            previousVersion = ''
          }

          const shouldPublish = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch'
            ? 'true'
            : String(currentVersion !== previousVersion)

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${currentVersion}\n`)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=v${currentVersion}\n`)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_publish=${shouldPublish}\n`)
          NODE

  lint-and-test:
    needs: detect-version-bump
    if: needs.detect-version-bump.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

  build-release:
    needs:
      - detect-version-bump
      - lint-and-test
    if: needs.detect-version-bump.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundle-root: src-tauri/target/universal-apple-darwin/release/bundle
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
            bundle-root: src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          - platform: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust-targets: x86_64-unknown-linux-gnu
            bundle-root: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle

    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.detect-version-bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Prepare updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required for updater artifacts."
            exit 1
          fi

          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > updater-private.key

      - name: Import signing certificate
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application:/ {print $2; exit}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Build Tauri app
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: updater-private.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            npm run tauri:build:mac -- --ci --bundles app --config src-tauri/tauri.updater.conf.json
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            npm run tauri:build:win -- --ci --config src-tauri/tauri.updater.conf.json
          else
            npm run tauri:build:linux -- --ci --config src-tauri/tauri.updater.conf.json
          fi

      - name: Collect release asset
        if: matrix.platform != 'macos'
        run: node scripts/release-assets.mjs --platform ${{ matrix.platform }} --bundle-root ${{ matrix.bundle-root }} --out-dir dist --version "$VERSION"

      - name: Collect updater assets
        run: node scripts/release-updater-assets.mjs --platform ${{ matrix.platform }} --bundle-root ${{ matrix.bundle-root }} --out-dir dist --version "$VERSION"

      - name: Package macOS zip
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dist
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/The Pair.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/the-pair-${VERSION}.zip"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: dist/
          retention-days: 7

  publish-release:
    needs:
      - detect-version-bump
      - build-release
    if: needs.detect-version-bump.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.detect-version-bump.outputs.version }}
      TAG: ${{ needs.detect-version-bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Prepare release notes
        run: |
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \\[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

      - name: Generate updater manifest
        run: |
          node scripts/generate-updater-manifest.mjs \
            --version "$VERSION" \
            --base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}" \
            --dist-dir dist \
            --notes-file release-notes.md \
            --output dist/latest.json

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --notes-file release-notes.md
          fi
