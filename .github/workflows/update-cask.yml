name: Sync Homebrew Cask (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the leading v (for example 1.2.3)
        required: true
        type: string

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: timwuhaotian/homebrew-the-pair
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Download ZIP
        id: download
        run: |
          curl -L -o the-pair.zip "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/the-pair-${{ inputs.version }}.zip"
          SHA256=$(shasum -a 256 the-pair.zip | cut -d ' ' -f 1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          rm the-pair.zip

      - name: Update Cask File
        run: |
          mkdir -p homebrew-tap/Casks
          cd homebrew-tap/Casks
          VERSION="${{ inputs.version }}"
          SHA256="${{ steps.download.outputs.sha256 }}"

          cat > the-pair.rb <<END_OF_CASK
          cask "the-pair" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/timwuhaotian/the-pair/releases/download/v\#{version}/the-pair-\#{version}.zip",
                verified: "github.com/timwuhaotian/the-pair/"
            name "The Pair"
            desc "Desktop orchestrator for dual AI agents (Mentor + Executor) for autonomous coding tasks"
            homepage "https://github.com/timwuhaotian/the-pair"

            auto_updates true
            depends_on macos: ">= :monterey"

            app "The Pair.app"

            uninstall quit: "com.thepair.app"

            zap trash: [
              "~/.config/the-pair",
              "~/Library/Application Support/the-pair",
              "~/Library/Caches/com.thepair.app",
              "~/Library/Logs/the-pair",
              "~/Library/Preferences/com.thepair.app.plist",
              "~/Library/Saved Application State/com.thepair.app.savedState",
            ]
          end
          END_OF_CASK

      - name: Commit and Push
        run: |
          cd homebrew-tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/the-pair.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date"
            exit 0
          fi
          git commit -m "Update the-pair to v${{ inputs.version }}"
          git push
