name: Update Homebrew Cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: macos-latest
    steps:
      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: timwuhaotian/homebrew-the-pair
          token: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Download DMG
        id: download
        run: |
          cd homebrew-tap
          curl -L -o the-pair.dmg "${{ github.event.release.assets[0].browser_download_url }}"
          SHA256=$(shasum -a 256 the-pair.dmg | cut -d ' ' -f 1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          rm the-pair.dmg

      - name: Update Cask File
        run: |
          cd homebrew-tap/Casks
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          SHA256="${{ steps.download.outputs.sha256 }}"
          
          cat > the-pair.rb << END_OF_CASK
cask "the-pair" do
  version "${VERSION}"
  sha256 "${SHA256}"

  url "https://github.com/timwuhaotian/the-pair/releases/download/v\#{version}/the-pair-\#{version}.dmg",
      verified: "github.com/timwuhaotian/the-pair/"
  name "The Pair"
  desc "Desktop orchestrator for dual AI agents (Mentor + Executor) for autonomous coding tasks"
  homepage "https://github.com/timwuhaotian/the-pair"

  auto_updates true
  depends_on macos: ">= :monterey"

  app "the-pair.app"

  uninstall quit: "com.electron.the-pair"

  zap trash: [
    "~/.config/the-pair",
    "~/Library/Application Support/the-pair",
    "~/Library/Caches/com.electron.the-pair",
    "~/Library/Logs/the-pair",
    "~/Library/Preferences/com.electron.the-pair.plist",
    "~/Library/Saved Application State/com.electron.the-pair.savedState",
  ]
end
END_OF_CASK

      - name: Commit and Push
        run: |
          cd homebrew-tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/the-pair.rb
          git commit -m "Update the-pair to ${{ github.event.release.tag_name }}"
          git push
