<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>The Pair</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0f172a;
      }
      html.dark {
        --bg: #020617;
        --fg: #f8fafc;
      }
      body {
        background-color: var(--bg);
        color: var(--fg);
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        align-items: center;
        justify-content: center;
      }
      .boot-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }
      .boot-zap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        color: #94a3b8;
      }
      .boot-zap svg {
        width: 48px;
        height: 48px;
        display: block;
        filter: drop-shadow(0 8px 18px rgba(148, 163, 184, 0.18));
      }
      .boot-text {
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--fg);
        opacity: 0.4;
      }
    </style>
    <script>
      (function() {
        try {
          const storage = JSON.parse(localStorage.getItem('theme-storage'));
          const theme = storage?.state?.theme;
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <div class="boot-loader">
        <div class="boot-zap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <defs>
              <linearGradient id="boot-zap-gradient" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#94a3b8" />
                <stop offset="20%" stop-color="#f8fafc" />
                <stop offset="52%" stop-color="#ffffff" />
                <stop offset="78%" stop-color="#cbd5e1" />
                <stop offset="100%" stop-color="#64748b" />
              </linearGradient>
            </defs>
            <polygon
              points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
              fill="url(#boot-zap-gradient)"
              stroke="url(#boot-zap-gradient)"
              stroke-width="0.35"
            ></polygon>
          </svg>
        </div>
        <div class="boot-text">The Pair · Powering Up</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
