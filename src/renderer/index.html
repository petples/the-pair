<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>The Pair</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0f172a;
      }
      html.dark {
        --bg: #020617;
        --fg: #f8fafc;
      }
      body {
        background:
          radial-gradient(circle at 50% 30%, rgba(148, 163, 184, 0.12), transparent 34%),
          radial-gradient(circle at 50% 70%, rgba(226, 232, 240, 0.06), transparent 28%),
          var(--bg);
        color: var(--fg);
        margin: 0;
        overflow: hidden;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        align-items: center;
        justify-content: center;
      }
      .boot-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }
      .boot-zap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        color: #cbd5e1;
        transform: translateZ(0);
      }
      .boot-zap::before {
        content: '';
        position: absolute;
        inset: -28%;
        border-radius: 9999px;
        background:
          radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.9) 0%, rgba(226, 232, 240, 0.34) 26%, rgba(148, 163, 184, 0.12) 52%, transparent 72%);
        filter: blur(2px);
        opacity: 0.9;
        animation: boot-halo 2.9s ease-in-out infinite;
      }
      .boot-zap::after {
        content: '';
        position: absolute;
        inset: -18%;
        border-radius: 9999px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.82) 47%,
          rgba(255, 255, 255, 0) 54%
        );
        background-size: 180% 180%;
        mix-blend-mode: screen;
        pointer-events: none;
        opacity: 0.88;
        animation:
          boot-sheen 2.35s linear infinite,
          boot-breathe 2.9s ease-in-out infinite;
      }
      .boot-zap svg {
        position: relative;
        z-index: 1;
        width: 48px;
        height: 48px;
        display: block;
        filter:
          drop-shadow(0 10px 22px rgba(148, 163, 184, 0.2))
          drop-shadow(0 0 12px rgba(255, 255, 255, 0.16));
      }
      .boot-text {
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--fg);
        opacity: 0.42;
      }
      @keyframes boot-sheen {
        0% {
          background-position: 50% -180%;
        }
        100% {
          background-position: 50% 180%;
        }
      }
      @keyframes boot-breathe {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.76;
        }
        50% {
          transform: scale(1.06);
          opacity: 1;
        }
      }
      @keyframes boot-halo {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.72;
        }
        50% {
          transform: scale(1.08);
          opacity: 0.98;
        }
      }
    </style>
    <script>
      ;(function () {
        try {
          const storage = JSON.parse(localStorage.getItem('theme-storage'))
          const theme = storage?.state?.theme
          if (
            theme === 'dark' ||
            (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>

  <body>
    <!-- Pre-React boot splash.
         If you need to change the very first "Powering Up" screen, edit this HTML block.
         Do not move these visuals into App.tsx; that file is only used after React mounts. -->
    <div id="root">
      <div class="boot-loader">
        <div class="boot-zap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <defs>
              <linearGradient
                id="boot-zap-gradient"
                x1="12"
                y1="2"
                x2="12"
                y2="22"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0%" stop-color="#64748b" />
                <stop offset="18%" stop-color="#f8fafc" />
                <stop offset="42%" stop-color="#ffffff" />
                <stop offset="58%" stop-color="#e2e8f0" />
                <stop offset="76%" stop-color="#94a3b8" />
                <stop offset="100%" stop-color="#475569" />
              </linearGradient>
            </defs>
            <polygon
              points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
              fill="url(#boot-zap-gradient)"
              stroke="url(#boot-zap-gradient)"
              stroke-width="0.35"
              stroke-linejoin="round"
            ></polygon>
          </svg>
        </div>
        <div class="boot-text">The Pair · Powering Up</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
